# /etc/msi-power-profile.conf
#
# Configuration for msi-power-profile. Sourced by /usr/local/bin/power-profile
# and /usr/local/bin/power-profile-monitor. Each setting has a fallback
# default in the scripts, so a missing or partial file still works - this is
# only for overrides.
#
# After editing, restart the monitor:
#   sudo systemctl restart power-profile-monitor.service
#
# Defaults below are tuned for the MSI Thin 15 B12UCX (i5-12450H,
# intel_backlight). Other hardware needs different values - especially
# MAX_BRIGHTNESS (see comment) and possibly the TDP ceilings.

# ---------- Per-profile TDP (watts) ----------
# PL1 = sustained power limit (indefinite).
# PL2 = burst limit (~28 s window before clamping to PL1).
# These get written to /sys/class/powercap/intel-rapl/intel-rapl:0/.

ULTRA_PL1=35
ULTRA_PL2=64

PERFORMANCE_PL1=28
PERFORMANCE_PL2=55

BALANCED_PL1=20
BALANCED_PL2=40

ECO_PL1=15
ECO_PL2=30

# ---------- Backlight ----------
# Hardware-specific maximum brightness (raw sysfs units).
# Find yours: cat /sys/class/backlight/intel_backlight/max_brightness
MAX_BRIGHTNESS=96000

# Eco-mode brightness as a percentage of MAX_BRIGHTNESS.
ECO_BRIGHTNESS_PCT=25

# ---------- Monitor daemon thresholds ----------
# Battery percentage below which we auto-switch to eco (unless overridden
# this session by user cycling out).
LOW_BAT_THRESHOLD=15

# Battery percentage at/above which AC-unplug goes to performance; below
# this and >= LOW_BAT_THRESHOLD, AC-unplug goes to balanced.
PERFORMANCE_BAT_THRESHOLD=60

# CPU temperature (Celsius) above which the Ultra thermal watchdog starts
# counting. Read from /sys/devices/platform/msi-ec/cpu/realtime_temperature.
THERMAL_TRIP=85

# Number of consecutive trip readings (3 s apart) required before Ultra
# automatically drops to Performance. Default = 3 reads = ~9 s but typically
# settles around 30 s of sustained heat given polling jitter.
THERMAL_READINGS=3
